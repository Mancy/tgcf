services:
  tgcf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tgcf-web
    ports:
      - "8501:8080"
    volumes:
      - ./tgcf.config.json:/app/tgcf.config.json
      - ./data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    networks:
      - tgcf-network

networks:
  tgcf-network:
    driver: bridge
